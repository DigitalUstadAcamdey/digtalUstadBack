services:
  digital_ustad_academy:
    ports:
      - "5000:5000"
    container_name: digital_ustad_academy_api
    build:
      context: .
      target: production
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.digitalustad.rule=Host(`api.digitalustadacademy.com`)" # replace the api.localhost with my domain name 'api.digitalustadacaedmy.com' , the HostRegexp(`{any:.*}`) for running ngrok app
      - "traefik.http.services.digitalustad.loadbalancer.server.port=5000"
      - "traefik.http.services.digitalustad.loadbalancer.passhostheader=true"
      - "traefik.http.services.digitalustad.loadbalancer.serversTransport=digitalustad-transport"
      - "traefik.http.routers.digitalustad.entrypoints=websecure"
      - "traefik.http.routers.digitalustad.tls=true"
      - "traefik.http.routers.digitalustad.tls.certresolver=letsencrypt" # for testing ssl in local type `selfsigned`  or `letsencrypt`
      - "traefik.http.routers.digitalustad.middlewares=digitalustad-cors"
      - "traefik.http.middlewares.digitalustad-cors.headers.accessControlAllowOriginList=https://www.digitalustadacademy.com,https://digitalustadacademy.com,http://localhost:3000"
      - "traefik.http.middlewares.digitalustad-cors.headers.accessControlAllowMethods=GET,POST,PUT,PATCH,DELETE,OPTIONS"
      - "traefik.http.middlewares.digitalustad-cors.headers.accessControlAllowHeaders=Content-Type,Authorization,X-Requested-With"
      - "traefik.http.middlewares.digitalustad-cors.headers.accessControlAllowCredentials=true"
      - "traefik.http.middlewares.digitalustad-cors.headers.addVaryHeader=true"
      - "traefik.http.serversTransports.digitalustad-transport.forwardingTimeouts.dialTimeout=30s"
      - "traefik.http.serversTransports.digitalustad-transport.forwardingTimeouts.responseHeaderTimeout=600s"
      - "traefik.http.serversTransports.digitalustad-transport.forwardingTimeouts.idleConnTimeout=600s"
    networks:
      - traefik-network
    depends_on:
      - mongo
    env_file:
      - ./.env

  traefik:
    image: traefik:v3.6
    container_name: traefik-app
    command:
      - "--providers.docker=true"
      - "--api.dashboard=true"
      - "--api.insecure=false"
      - "--log.level=INFO"
      - "--accesslog=true"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=contact@digitalustadacademy.com"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      # selef certificate
      # - "--certificatesresolvers.selfsigned.acme.tlschallenge=true"
      # - "--certificatesresolvers.selfsigned.acme.email=you@example.com"
      # - "--certificatesresolvers.selfsigned.acme.storage=/letsencrypt/acme.json"

    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - traefik_letsencrypt:/letsencrypt
    networks:
      - traefik-network
  mongo:
    image: mongo
    restart: always
    networks:
      - traefik-network
    command: ["mongod", "--bind_ip_all"]
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example
    volumes:
      - /root/mongo-data-bind-backup:/data/db

  mongo-express:
    image: mongo-express
    restart: always
    networks:
      - traefik-network
    ports:
      - 8082:8081
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://root:example@mongo:27017/
      ME_CONFIG_BASICAUTH_ENABLED: true
      ME_CONFIG_BASICAUTH_USERNAME: mongoexpressuser
      ME_CONFIG_BASICAUTH_PASSWORD: mongoexpresspass

networks:
  traefik-network:
    external: true

volumes:
  mongo_data:
  traefik_letsencrypt:
